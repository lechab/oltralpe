backend:
  name: git-gateway
  branch: main # Votre branche principale
site_url: https://netlify.app
media_folder: "images/uploads" # Où seront stockées les photos
public_folder: "/images/uploads"

collections:
  - name: "news"
    label: "Novita"
    folder: "content/news" # Où seront créés les fichiers de news
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Titre", name: "title", widget: "string"}
      - {label: "Date", name: "date", widget: "datetime"}
      - {label: "Image de couverture", name: "image", widget: "image"}
      - {label: "Contenu", name: "body", widget: "markdown"}
