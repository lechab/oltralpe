<script>
  // Remplacez par votre clé API notée précédemment
  const API_KEY = '8d2cc5837084120e5ac56f33a3a867a48ab1660f18d6238a69c33e23aa378d9daa95fe19391368926cdb8b699f0fbd6dc9499c47925235d128e60ade7a5a10e5';
  const API_URL = 'https://oltralpe.it' + API_KEY;

  async function loadNews() {
    try {
      const response = await fetch(API_URL);
      const data = await response.json();

      let html = '';
      // On prend les 3 dernières news (Bludit renvoie un tableau dans data.data)
      data.data.slice(0, 3).forEach(news => {
        html += `
                <div style="margin-bottom: 20px; border-bottom: 1px solid #ccc; padding-bottom: 10px;">
                    <h3>${news.title}</h3>
                    <p><small>Publié le : ${news.date}</small></p>
                    <p>${news.description}</p>
                    <a href="https://oltralpe.it{news.key}">Lire la suite</a>
                </div>
            `;
      });

      document.getElementById('news-container').innerHTML = html;
    } catch (error) {
      console.error('Erreur:', error);
      document.getElementById('news-container').innerHTML = "Impossible de charger les news.";
    }
  }

  loadNews();
</script>
