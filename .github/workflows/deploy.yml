name: Deploy to Aruba
on:
  push:
    branches:
      - main
jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          server-dir: /
          # Options critiques pour Aruba :
          dangerous-clean-slate: false # Ne pas essayer de supprimer des fichiers
          dry-run: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
